<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ШИФР — защищённый мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="sh-letter">Ш</div>
            <div class="logo-text">ШИФР</div>
        </div>
        
        <div class="slogan-container">
            <span id="slogan" class="slogan"></span>
            <span class="cursor">|</span>
        </div>
        
        <button id="continueBtn" class="continue-btn">Продолжить</button>
        
        <button id="langToggle" class="lang-btn">English</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
